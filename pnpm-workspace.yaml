# pnpm settings.
#
# Under pnpm 10+, the `overrides` field is read from this file
# (pnpm-workspace.yaml), NOT from package.json. The two override blocks that
# previously lived in package.json (`overrides` and `pnpm.overrides`) were
# silently ignored by pnpm 10.28.x, so the security pins below were not being
# enforced. They are consolidated here so pnpm actually applies them.
#
# Notable changes vs. the old package.json blocks:
#  - Dropped `eslint: ^9.39.2` — stale; conflicted with the devDependency range
#    (^10.x) and was never honoured anyway.
#  - Dropped `gm`, `@azure/core-http`, `@aws-sdk/node-http-handler`, `dommatrix`
#    and `rimraf` — these targeted packages that are NOT present in the
#    dependency tree (no-ops), and their original values used npm-only syntax
#    (booleans / bare package names) that pnpm cannot honour. Re-add with pnpm
#    syntax (`"-"` to remove, `npm:<pkg>@<range>` to replace) if a transitive
#    dependency ever reintroduces them.
#
# Reference: https://pnpm.io/settings#overrides
overrides:
  # --- transitive dependency hygiene / CVE mitigation ---
  fast-xml-parser: "4.5.4"
  axios: "^1.13.6"
  form-data: "^4.0.4"
  minimatch: "^3.1.3"
  ajv: "6.14.0"
  qs: "^6.14.2"
  # --- dedup / modernisation of transitive versions present in the tree ---
  semver: "^7.7.4"
  glob: "^10.0.0"
